name: Keep Render Service Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Voicebox health endpoint
        run: |
          curl --fail --silent --show-error --max-time 30 \
            https://voicebox-ccvt.onrender.com/health
